name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Shared environment variables for jobs without database
  MOCK_DATABASE_URL: postgresql://mock:mock@localhost:5432/mock

jobs:
  # Code Quality & Linting (no DB needed)
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Create minimal .env for imports
      run: |
        echo "APP_NAME=Homeschool API Test" > .env
        echo "DEBUG=True" >> .env
        echo "ENVIRONMENT=test" >> .env
        echo "SECRET_KEY=test-key" >> .env
        echo "DATABASE_URL=${{ env.MOCK_DATABASE_URL }}" >> .env

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 flake8-docstrings flake8-bugbear
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run flake8
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  # Security Scan (no DB needed)
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Create minimal .env for imports
      run: |
        echo "APP_NAME=Homeschool API Test" > .env
        echo "SECRET_KEY=test-key" >> .env
        echo "DATABASE_URL=${{ env.MOCK_DATABASE_URL }}" >> .env

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run Safety check
      run: |
        if [ -f requirements.txt ]; then safety check --file requirements.txt --json || true; fi
      continue-on-error: true

    - name: Run Bandit
      run: |
        bandit -r app/ -f json -o bandit-report.json || true
      continue-on-error: true

    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

  # Tests (NEEDS REAL DATABASE)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-asyncio httpx
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create test .env file
      run: |
        echo "APP_NAME=Homeschool API Test" > .env
        echo "DEBUG=True" >> .env
        echo "ENVIRONMENT=test" >> .env
        echo "SECRET_KEY=test-secret-key-for-ci" >> .env
        echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> .env

    - name: Wait for PostgreSQL
      run: |
        timeout 30 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'

    - name: Run migrations
      run: |
        alembic upgrade head

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing || echo "No tests found yet"
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  # Build Test (NEEDS REAL DATABASE)
  build:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: build_user
          POSTGRES_PASSWORD: build_password
          POSTGRES_DB: build_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create test .env file
      run: |
        echo "APP_NAME=Homeschool Map API" > .env
        echo "DEBUG=False" >> .env
        echo "ENVIRONMENT=production" >> .env
        echo "SECRET_KEY=test-secret-key-for-build" >> .env
        echo "DATABASE_URL=postgresql://build_user:build_password@localhost:5432/build_db" >> .env

    - name: Wait for PostgreSQL
      run: |
        timeout 30 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done'

    - name: Run migrations
      run: |
        alembic upgrade head

    - name: Test app startup
      run: |
        timeout 10 uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        curl -f http://localhost:8000/health || exit 1
        echo "✅ Health check passed"

  # Docker Build
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: homeschool-map-api:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
      continue-on-error: true

  # Dependency Review
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      continue-on-error: true
