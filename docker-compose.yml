version: '3.8'

services:
  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:15-3.3
    container_name: homeschool_postgres
    environment:
      POSTGRES_USER: homeschool_user
      POSTGRES_PASSWORD: homeschool_pass
      POSTGRES_DB: homeschool_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: initialization scripts
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homeschool_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

# To run:
# docker-compose up -d
#
# To stop:
# docker-compose down
#
# To reset database (WARNING: deletes all data):
# docker-compose down -v
